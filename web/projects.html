<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目管理 - 项目管理平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#E8F3FF',
                        dark: '#1D2939',
                        light: '#F9FAFB',
                        success: '#10B981',
                        warning: '#F59E0B',
                        danger: '#EF4444'
                    },
                    fontFamily: {
                        inter: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .input-field {
                @apply w-full px-4 py-3 border border-gray-300 rounded-lg focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all duration-300;
            }
            .btn-primary {
                @apply px-5 py-3 bg-primary text-white rounded-lg font-medium shadow hover:bg-primary/90 transition-all;
            }
            .btn-outline {
                @apply px-5 py-3 border border-primary text-primary rounded-lg font-medium hover:bg-primary/5 transition-all;
            }
            .panel {
                @apply bg-white rounded-2xl shadow-sm border border-gray-100;
            }
        }
    </style>
</head>
<body class="font-inter bg-slate-50 text-dark min-h-screen">
    <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
            <div>
                <a href="index.html" class="text-sm text-primary hover:underline"><i class="fa fa-arrow-left mr-2"></i>返回首页</a>
                <h1 class="text-2xl font-bold mt-2">项目管理</h1>
                <p class="text-gray-500 mt-1">查看、创建、编辑和删除项目，全部操作接入真实后端接口。</p>
            </div>
            <div class="flex items-center gap-3">
                <a href="workspace.html" class="btn-outline"><i class="fa fa-code mr-2"></i>代码工作台</a>
                <button id="seedDataBtn" class="btn-outline"><i class="fa fa-database mr-2"></i>生成测试数据</button>
                <button id="refreshBtn" class="btn-outline"><i class="fa fa-refresh mr-2"></i>刷新</button>
                <button id="openCreateModalBtn" class="btn-primary"><i class="fa fa-plus mr-2"></i>新建项目</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-6">
        <section class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="panel p-5">
                <p class="text-sm text-gray-500">项目总数</p>
                <p id="totalProjects" class="text-3xl font-bold mt-2">0</p>
            </div>
            <div class="panel p-5">
                <p class="text-sm text-gray-500">进行中</p>
                <p id="activeProjects" class="text-3xl font-bold mt-2 text-primary">0</p>
            </div>
            <div class="panel p-5">
                <p class="text-sm text-gray-500">待审核</p>
                <p id="testingProjects" class="text-3xl font-bold mt-2 text-warning">0</p>
            </div>
            <div class="panel p-5">
                <p class="text-sm text-gray-500">已完成</p>
                <p id="completedProjects" class="text-3xl font-bold mt-2 text-success">0</p>
            </div>
        </section>

        <section class="panel p-5">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">关键词搜索</label>
                    <input id="keywordInput" class="input-field" placeholder="搜索项目名称或描述">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">状态筛选</label>
                    <select id="statusFilter" class="input-field">
                        <option value="">全部状态</option>
                        <option value="planning">待规划</option>
                        <option value="developing">进行中</option>
                        <option value="testing">待审核</option>
                        <option value="deployed">已完成</option>
                    </select>
                </div>
                <div class="flex items-end gap-3">
                    <button id="searchBtn" class="btn-primary w-full">搜索</button>
                    <button id="resetBtn" class="btn-outline w-full">重置</button>
                </div>
            </div>
        </section>

        <section class="panel overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full min-w-[900px]">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">项目名称</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">技术栈</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">状态</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">进度</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">负责人</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">创建时间</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">AI</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">操作</th>
                        </tr>
                    </thead>
                    <tbody id="projectListBody" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </section>

        <section class="panel p-5">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h2 class="text-lg font-semibold">演示用户列表</h2>
                    <p class="text-sm text-gray-500 mt-1">用于验证账号、权限和设置面板的数据。</p>
                </div>
                <span id="userCountBadge" class="text-sm px-3 py-2 rounded-full bg-slate-100 text-slate-600">0 用户</span>
            </div>
            <div id="userList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
        </section>
    </main>

    <div id="projectModal" class="fixed inset-0 bg-slate-950/50 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden">
            <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
                <div>
                    <h2 id="modalTitle" class="text-xl font-bold">新建项目</h2>
                    <p class="text-sm text-gray-500 mt-1">项目名称、技术栈和状态都将提交到真实后端。</p>
                </div>
                <button id="closeModalBtn" class="text-gray-400 hover:text-gray-700"><i class="fa fa-times text-xl"></i></button>
            </div>
            <form id="projectForm" class="p-6 space-y-4">
                <input type="hidden" id="projectId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">项目名称</label>
                        <input id="projectName" class="input-field" required>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">项目描述</label>
                        <textarea id="projectDescription" class="input-field min-h-[110px]"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">技术栈</label>
                        <select id="projectTechStack" class="input-field" required>
                            <option value="Spring Boot">Spring Boot</option>
                            <option value="SSM">SSM</option>
                            <option value="Spring Cloud">Spring Cloud</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">状态</label>
                        <select id="projectStatus" class="input-field">
                            <option value="planning">待规划</option>
                            <option value="developing">进行中</option>
                            <option value="testing">待审核</option>
                            <option value="deployed">已完成</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">进度</label>
                        <input id="projectProgress" class="input-field" type="number" min="0" max="100" value="0">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">负责人 ID</label>
                        <input id="projectLeaderId" class="input-field" type="number" min="1" placeholder="默认当前登录用户">
                    </div>
                </div>
                <div class="flex items-center justify-end gap-3 pt-4">
                    <button type="button" id="cancelModalBtn" class="btn-outline">取消</button>
                    <button type="submit" class="btn-primary">保存项目</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-slate-950/50 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-xl shadow-2xl overflow-hidden">
            <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
                <h2 class="text-xl font-bold">项目详情</h2>
                <button id="closeDetailBtn" class="text-gray-400 hover:text-gray-700"><i class="fa fa-times text-xl"></i></button>
            </div>
            <div id="detailContent" class="p-6 space-y-4 text-sm text-gray-700"></div>
        </div>
    </div>

    <div id="aiModal" class="fixed inset-0 bg-slate-950/50 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden">
            <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
                <div>
                    <h2 id="aiModalTitle" class="text-xl font-bold">AI 分析</h2>
                    <p class="text-sm text-gray-500 mt-1">优先调用免费模型，失败时自动回退到本地规则分析。</p>
                </div>
                <button id="closeAiBtn" class="text-gray-400 hover:text-gray-700"><i class="fa fa-times text-xl"></i></button>
            </div>
            <div id="aiModalContent" class="p-6 whitespace-pre-wrap leading-7 text-gray-700 min-h-[220px]">正在生成分析结果...</div>
        </div>
    </div>

    <script>
        const API_BASE = '/project-management/api';
        const statusLabelMap = {
            planning: '待规划',
            developing: '进行中',
            testing: '待审核',
            deployed: '已完成'
        };
        let currentUser = null;

        function getToken() {
            return localStorage.getItem('token');
        }

        function authHeaders(extra = {}) {
            const token = getToken();
            return {
                'Content-Type': 'application/json',
                ...(token ? { Authorization: `Bearer ${token}` } : {}),
                ...extra,
            };
        }

        function handleUnauthorized(response) {
            if (response.status === 401) {
                localStorage.removeItem('token');
                window.location.href = 'login.html';
                return true;
            }
            return false;
        }

        async function requestJson(url, options = {}) {
            const response = await fetch(url, options);
            if (handleUnauthorized(response)) {
                throw new Error('登录已失效');
            }
            return response.json();
        }

        function showModal(element) {
            element.classList.remove('hidden');
            element.classList.add('flex');
        }

        function hideModal(element) {
            element.classList.add('hidden');
            element.classList.remove('flex');
        }

        function statusBadgeClass(statusText) {
            if (statusText === '已完成') return 'bg-green-100 text-green-700';
            if (statusText === '待审核') return 'bg-amber-100 text-amber-700';
            if (statusText === '待规划') return 'bg-slate-100 text-slate-700';
            return 'bg-blue-100 text-blue-700';
        }

        async function loadDashboard() {
            const data = await requestJson(`${API_BASE}/projects/dashboard`, {
                headers: authHeaders()
            });
            if (data.code !== 200) return;
            document.getElementById('totalProjects').textContent = data.data.totalProjects;
            document.getElementById('activeProjects').textContent = data.data.activeProjects;
            document.getElementById('testingProjects').textContent = data.data.testingProjects;
            document.getElementById('completedProjects').textContent = data.data.completedProjects;
        }

        async function fetchCurrentUser() {
            const data = await requestJson(`${API_BASE}/auth/me`, {
                headers: authHeaders()
            });
            if (data.code === 200) {
                currentUser = data.data;
            }
        }

        async function loadUsers() {
            const data = await requestJson(`${API_BASE}/users`, {
                headers: authHeaders()
            });
            const container = document.getElementById('userList');
            if (data.code !== 200) {
                container.innerHTML = '<div class="text-sm text-red-500">获取用户列表失败</div>';
                return;
            }
            document.getElementById('userCountBadge').textContent = `${data.data.length} 用户`;
            container.innerHTML = data.data.map(user => `
                <div class="rounded-2xl border border-line bg-slate-50 p-4">
                    <div class="flex items-center justify-between">
                        <h3 class="font-semibold text-slate-900">${user.nickname || user.username}</h3>
                        <span class="text-xs px-2 py-1 rounded-full ${user.status === 1 ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-600'}">${user.status === 1 ? '启用' : '禁用'}</span>
                    </div>
                    <div class="mt-3 space-y-2 text-sm text-slate-600">
                        <div>用户名：${user.username}</div>
                        <div>邮箱：${user.email || '-'}</div>
                        <div>手机号：${user.phone || '-'}</div>
                        <div>默认密码：admin123</div>
                    </div>
                </div>
            `).join('');
        }

        async function loadProjects() {
            const keyword = document.getElementById('keywordInput').value.trim();
            const status = document.getElementById('statusFilter').value;
            const query = new URLSearchParams();
            if (keyword) query.set('keyword', keyword);
            if (status) query.set('status', status);
            const data = await requestJson(`${API_BASE}/projects?${query.toString()}`, {
                headers: authHeaders()
            });
            if (data.code !== 200) {
                alert(data.message || '获取项目列表失败');
                return;
            }
            renderProjects(data.data || []);
        }

        function renderProjects(projects) {
            const body = document.getElementById('projectListBody');
            body.innerHTML = '';
            if (!projects.length) {
                body.innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-10 text-center text-gray-500">暂无项目数据</td>
                    </tr>
                `;
                return;
            }

            projects.forEach(project => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="font-medium text-gray-900">${project.name}</div>
                        <div class="text-sm text-gray-500 mt-1">${project.description || ''}</div>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-600">${project.techStack}</td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 rounded-full text-xs font-semibold ${statusBadgeClass(project.status)}">${project.status}</span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="w-36 bg-gray-100 rounded-full h-2 overflow-hidden">
                            <div class="bg-primary h-2 rounded-full" style="width:${project.progress || 0}%"></div>
                        </div>
                        <div class="text-xs text-gray-500 mt-2">${project.progress || 0}%</div>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-600">${project.manager}</td>
                    <td class="px-6 py-4 text-sm text-gray-600">${project.createdAt}</td>
                    <td class="px-6 py-4 text-sm font-medium">
                        <div class="flex flex-col gap-2">
                            <button class="text-violet-600 hover:underline text-left" data-action="ai-summary" data-id="${project.id}">AI 总结</button>
                            <button class="text-cyan-700 hover:underline text-left" data-action="ai-risk" data-id="${project.id}">风险建议</button>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-sm font-medium">
                        <div class="flex items-center gap-3">
                            <button class="text-primary hover:underline" data-action="view" data-id="${project.id}">查看</button>
                            <button class="text-gray-700 hover:underline" data-action="edit" data-id="${project.id}">编辑</button>
                            <button class="text-danger hover:underline text-red-500" data-action="delete" data-id="${project.id}">删除</button>
                        </div>
                    </td>
                `;
                body.appendChild(row);
            });
        }

        async function showProjectDetail(projectId) {
            const data = await requestJson(`${API_BASE}/projects/${projectId}`, {
                headers: authHeaders()
            });
            if (data.code !== 200) {
                alert(data.message || '获取项目详情失败');
                return;
            }
            const project = data.data;
            document.getElementById('detailContent').innerHTML = `
                <div>
                    <p class="text-gray-500">项目名称</p>
                    <p class="text-lg font-semibold mt-1">${project.name}</p>
                </div>
                <div>
                    <p class="text-gray-500">项目描述</p>
                    <p class="mt-1">${project.description || '暂无描述'}</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <p class="text-gray-500">技术栈</p>
                        <p class="mt-1">${project.techStack}</p>
                    </div>
                    <div>
                        <p class="text-gray-500">状态</p>
                        <p class="mt-1">${project.statusLabel}</p>
                    </div>
                    <div>
                        <p class="text-gray-500">负责人</p>
                        <p class="mt-1">${project.manager}</p>
                    </div>
                    <div>
                        <p class="text-gray-500">进度</p>
                        <p class="mt-1">${project.progress || 0}%</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <p class="text-gray-500">创建时间</p>
                        <p class="mt-1">${project.createdAt}</p>
                    </div>
                    <div>
                        <p class="text-gray-500">更新时间</p>
                        <p class="mt-1">${project.updatedAt}</p>
                    </div>
                </div>
            `;
            showModal(document.getElementById('detailModal'));
        }

        function openCreateModal() {
            document.getElementById('modalTitle').textContent = '新建项目';
            document.getElementById('projectForm').reset();
            document.getElementById('projectId').value = '';
            document.getElementById('projectProgress').value = '0';
            document.getElementById('projectLeaderId').value = currentUser?.id || '';
            showModal(document.getElementById('projectModal'));
        }

        async function openEditModal(projectId) {
            const data = await requestJson(`${API_BASE}/projects/${projectId}`, {
                headers: authHeaders()
            });
            if (data.code !== 200) {
                alert(data.message || '获取项目详情失败');
                return;
            }
            const project = data.data;
            document.getElementById('modalTitle').textContent = '编辑项目';
            document.getElementById('projectId').value = project.id;
            document.getElementById('projectName').value = project.name || '';
            document.getElementById('projectDescription').value = project.description || '';
            document.getElementById('projectTechStack').value = project.techStack || 'Spring Boot';
            document.getElementById('projectStatus').value = project.status || 'planning';
            document.getElementById('projectProgress').value = project.progress || 0;
            document.getElementById('projectLeaderId').value = project.leaderId || '';
            showModal(document.getElementById('projectModal'));
        }

        async function submitProject(event) {
            event.preventDefault();
            const projectId = document.getElementById('projectId').value;
            const payload = {
                name: document.getElementById('projectName').value.trim(),
                description: document.getElementById('projectDescription').value.trim(),
                techStack: document.getElementById('projectTechStack').value,
                status: document.getElementById('projectStatus').value,
                progress: Number(document.getElementById('projectProgress').value || 0),
            };

            const leaderId = document.getElementById('projectLeaderId').value.trim();
            if (leaderId) {
                payload.leaderId = Number(leaderId);
            }

            const isEdit = Boolean(projectId);
            const data = await requestJson(
                isEdit ? `${API_BASE}/projects/${projectId}` : `${API_BASE}/projects`,
                {
                    method: isEdit ? 'PUT' : 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify(payload)
                }
            );

            if (data.code !== 200) {
                alert(data.message || '保存项目失败');
                return;
            }

            if (isEdit) {
                await requestJson(`${API_BASE}/projects/${projectId}/progress?progress=${payload.progress}`, {
                    method: 'PUT',
                    headers: authHeaders()
                });
            }

            hideModal(document.getElementById('projectModal'));
            await Promise.all([loadDashboard(), loadProjects()]);
        }

        async function deleteProject(projectId) {
            if (!window.confirm('确认删除这个项目吗？')) return;
            const data = await requestJson(`${API_BASE}/projects/${projectId}`, {
                method: 'DELETE',
                headers: authHeaders()
            });
            if (data.code !== 200) {
                alert(data.message || '删除项目失败');
                return;
            }
            await Promise.all([loadDashboard(), loadProjects()]);
        }

        async function seedTestData() {
            const data = await requestJson(`${API_BASE}/test-data/seed?userCount=4&projectCount=6`, {
                method: 'POST',
                headers: authHeaders()
            });
            if (data.code !== 200) {
                alert(data.message || '生成测试数据失败');
                return;
            }
            alert(`已生成 ${data.data.createdUsers} 个用户，${data.data.createdProjects} 个项目，默认密码为 ${data.data.defaultPassword}`);
            await Promise.all([loadDashboard(), loadProjects(), loadUsers()]);
        }

        async function openAiModal(title, url, responseKey) {
            document.getElementById('aiModalTitle').textContent = title;
            document.getElementById('aiModalContent').textContent = '正在生成分析结果...';
            showModal(document.getElementById('aiModal'));
            const data = await requestJson(url, {
                headers: authHeaders()
            });
            if (data.code !== 200) {
                document.getElementById('aiModalContent').textContent = data.message || 'AI 分析失败。';
                return;
            }
            document.getElementById('aiModalContent').textContent = data.data[responseKey];
        }

        document.getElementById('projectListBody').addEventListener('click', async (event) => {
            const button = event.target.closest('button[data-action]');
            if (!button) return;
            const projectId = button.dataset.id;
            const action = button.dataset.action;
            if (action === 'view') {
                await showProjectDetail(projectId);
            } else if (action === 'edit') {
                await openEditModal(projectId);
            } else if (action === 'delete') {
                await deleteProject(projectId);
            } else if (action === 'ai-summary') {
                await openAiModal('AI 项目总结', `${API_BASE}/ai/projects/${projectId}/summary`, 'summary');
            } else if (action === 'ai-risk') {
                await openAiModal('AI 风险建议', `${API_BASE}/ai/projects/${projectId}/risk`, 'riskAdvice');
            }
        });

        document.getElementById('searchBtn').addEventListener('click', loadProjects);
        document.getElementById('seedDataBtn').addEventListener('click', seedTestData);
        document.getElementById('refreshBtn').addEventListener('click', async () => {
            await Promise.all([loadDashboard(), loadProjects(), loadUsers()]);
        });
        document.getElementById('resetBtn').addEventListener('click', async () => {
            document.getElementById('keywordInput').value = '';
            document.getElementById('statusFilter').value = '';
            await loadProjects();
        });
        document.getElementById('openCreateModalBtn').addEventListener('click', openCreateModal);
        document.getElementById('closeModalBtn').addEventListener('click', () => hideModal(document.getElementById('projectModal')));
        document.getElementById('cancelModalBtn').addEventListener('click', () => hideModal(document.getElementById('projectModal')));
        document.getElementById('closeDetailBtn').addEventListener('click', () => hideModal(document.getElementById('detailModal')));
        document.getElementById('closeAiBtn').addEventListener('click', () => hideModal(document.getElementById('aiModal')));
        document.getElementById('projectModal').addEventListener('click', (event) => {
            if (event.target.id === 'projectModal') {
                hideModal(document.getElementById('projectModal'));
            }
        });
        document.getElementById('detailModal').addEventListener('click', (event) => {
            if (event.target.id === 'detailModal') {
                hideModal(document.getElementById('detailModal'));
            }
        });
        document.getElementById('aiModal').addEventListener('click', (event) => {
            if (event.target.id === 'aiModal') {
                hideModal(document.getElementById('aiModal'));
            }
        });
        document.getElementById('projectForm').addEventListener('submit', submitProject);

        window.addEventListener('DOMContentLoaded', async () => {
            if (!getToken()) {
                window.location.href = 'login.html';
                return;
            }
            try {
                await Promise.all([fetchCurrentUser(), loadDashboard(), loadProjects(), loadUsers()]);
                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    await openEditModal(editId);
                }
            } catch (error) {
                console.error(error);
            }
        });
    </script>
</body>
</html>
