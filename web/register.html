<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 项目管理平台</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#E8F3FF',
                        dark: '#1D2939',
                        light: '#F9FAFB',
                        success: '#10B981',
                        warning: '#F59E0B',
                        danger: '#EF4444',
                        info: '#3B82F6'
                    },
                    fontFamily: {
                        inter: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .animate-float {
                animation: float 6s ease-in-out infinite;
            }
            .animate-fade-in {
                animation: fadeIn 0.6s ease-out forwards;
            }
            .form-input-focus {
                @apply focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none;
            }
            .error-input {
                @apply border-danger focus:border-danger focus:ring-danger/20;
            }
            .success-input {
                @apply border-success focus:border-success focus:ring-success/20;
            }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="font-inter bg-light min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-5xl">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">
            <!-- 左侧装饰区域 -->
            <div class="bg-primary md:w-1/2 p-8 md:p-12 text-white relative overflow-hidden">
                <div class="absolute inset-0 opacity-10">
                    <div class="absolute w-64 h-64 rounded-full bg-white top-1/4 -left-32"></div>
                    <div class="absolute w-96 h-96 rounded-full bg-white bottom-1/4 -right-48"></div>
                </div>

                <div class="relative z-10 h-full flex flex-col justify-center">
                    <div class="mb-10 animate-float">
                        <div class="w-16 h-16 bg-white/20 rounded-lg flex items-center justify-center mb-4">
                            <i class="fa fa-code text-white text-2xl"></i>
                        </div>
                        <h2 class="text-3xl font-bold">项目管理平台</h2>
                        <p class="mt-2 opacity-90">智能、高效的项目管理解决方案</p>
                    </div>

                    <div class="space-y-6">
                        <div class="flex items-start space-x-4 animate-fade-in" style="animation-delay: 0.2s">
                            <div class="mt-1 bg-white/20 p-2 rounded">
                                <i class="fa fa-users text-white"></i>
                            </div>
                            <div>
                                <h3 class="text-xl font-semibold">团队协作</h3>
                                <p class="opacity-80 mt-1">实时协作，提高团队工作效率</p>
                            </div>
                        </div>

                        <div class="flex items-start space-x-4 animate-fade-in" style="animation-delay: 0.4s">
                            <div class="mt-1 bg-white/20 p-2 rounded">
                                <i class="fa fa-line-chart text-white"></i>
                            </div>
                            <div>
                                <h3 class="text-xl font-semibold">项目跟踪</h3>
                                <p class="opacity-80 mt-1">实时跟踪项目进度，确保按时交付</p>
                            </div>
                        </div>

                        <div class="flex items-start space-x-4 animate-fade-in" style="animation-delay: 0.6s">
                            <div class="mt-1 bg-white/20 p-2 rounded">
                                <i class="fa fa-rocket text-white"></i>
                            </div>
                            <div>
                                <h3 class="text-xl font-semibold">一键部署</h3>
                                <p class="opacity-80 mt-1">简化部署流程，快速上线项目</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧注册表单区域 -->
            <div class="md:w-1/2 p-8 md:p-12 animate-fade-in">
                <div class="max-w-md mx-auto w-full">
                    <h2 class="text-2xl md:text-3xl font-bold text-dark mb-6">创建账号</h2>
                    <p class="text-gray-600 mb-8">填写以下信息注册新账号</p>

                    <!-- 成功提示（如果有） -->
                    <div id="successMessage" class="mb-5 p-3 bg-green-50 border border-green-200 text-success rounded-lg text-sm flex items-center hidden">
                        <i class="fa fa-check-circle mr-2"></i>
                        <span>注册成功，请登录系统</span>
                    </div>

                    <!-- 错误提示（如果有） -->
                    <div id="errorMessage" class="mb-5 p-3 bg-red-50 border border-red-200 text-danger rounded-lg text-sm flex items-center hidden">
                        <i class="fa fa-exclamation-circle mr-2"></i>
                        <span>注册失败，请稍后重试</span>
                    </div>

                    <form id="registerForm" class="space-y-5">
                        <!-- 用户名输入 -->
                        <div>
                            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fa fa-user text-gray-400"></i>
                                </div>
                                <input type="text" id="username" name="username"
                                       class="w-full pl-10 py-3 border border-gray-300 rounded-lg transition-all duration-200 form-input-focus"
                                       placeholder="请输入用户名">
                            </div>
                            <p id="usernameError" class="mt-1 text-danger text-sm hidden"><i class="fa fa-times-circle mr-1"></i>用户名不能为空</p>
                        </div>

                        <!-- 密码输入 -->
                        <div>
                            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fa fa-lock text-gray-400"></i>
                                </div>
                                <input type="password" id="password" name="password"
                                       class="w-full pl-10 py-3 border border-gray-300 rounded-lg transition-all duration-200 form-input-focus"
                                       placeholder="请输入密码">
                                <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 transition-colors">
                                    <i class="fa fa-eye-slash"></i>
                                </button>
                            </div>
                            <p id="passwordError" class="mt-1 text-danger text-sm hidden"><i class="fa fa-times-circle mr-1"></i>密码不能为空，至少6位</p>
                        </div>

                        <!-- 确认密码输入 -->
                        <div>
                            <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fa fa-lock text-gray-400"></i>
                                </div>
                                <input type="password" id="confirmPassword" name="confirmPassword"
                                       class="w-full pl-10 py-3 border border-gray-300 rounded-lg transition-all duration-200 form-input-focus"
                                       placeholder="请再次输入密码">
                                <button type="button" id="toggleConfirmPassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 transition-colors">
                                    <i class="fa fa-eye-slash"></i>
                                </button>
                            </div>
                            <p id="confirmPasswordError" class="mt-1 text-danger text-sm hidden"><i class="fa fa-times-circle mr-1"></i>两次输入的密码不一致</p>
                        </div>

                        <!-- 邮箱输入 -->
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fa fa-envelope text-gray-400"></i>
                                </div>
                                <input type="email" id="email" name="email"
                                       class="w-full pl-10 py-3 border border-gray-300 rounded-lg transition-all duration-200 form-input-focus"
                                       placeholder="请输入邮箱地址">
                            </div>
                            <p id="emailError" class="mt-1 text-danger text-sm hidden"><i class="fa fa-times-circle mr-1"></i>邮箱格式不正确</p>
                        </div>

                        <!-- 手机号输入 -->
                        <div>
                            <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">手机号</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fa fa-phone text-gray-400"></i>
                                </div>
                                <input type="tel" id="phone" name="phone"
                                       class="w-full pl-10 py-3 border border-gray-300 rounded-lg transition-all duration-200 form-input-focus"
                                       placeholder="请输入手机号">
                            </div>
                            <p id="phoneError" class="mt-1 text-danger text-sm hidden"><i class="fa fa-times-circle mr-1"></i>手机号格式不正确</p>
                        </div>

                        <!-- 同意条款 -->
                        <div class="flex items-start">
                            <div class="flex items-center h-5">
                                <input id="terms" name="terms" type="checkbox"
                                       class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                            </div>
                            <div class="ml-3 text-sm">
                                <label for="terms" class="text-gray-600">
                                    我已阅读并同意 <a href="#" class="text-primary hover:text-primary/80 transition-colors">服务条款</a> 和 <a href="#" class="text-primary hover:text-primary/80 transition-colors">隐私政策</a>
                                </label>
                                <p id="termsError" class="mt-1 text-danger text-sm hidden"><i class="fa fa-times-circle mr-1"></i>请同意服务条款和隐私政策</p>
                            </div>
                        </div>

                        <!-- 注册按钮 -->
                        <div>
                            <button type="submit" name="register"
                                    class="w-full py-3 px-4 bg-primary hover:bg-primary/90 text-white font-medium rounded-lg transition-all duration-200 shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                                注册
                            </button>
                        </div>

                        <!-- 重置按钮 -->
                        <div>
                            <button type="reset" onclick="resetForm()"
                                    class="w-full py-3 px-4 bg-gray-100 hover:bg-gray-200 text-gray-800 font-medium rounded-lg transition-all duration-200">
                                重置
                            </button>
                        </div>
                    </form>

                    <!-- 登录链接 -->
                    <div class="mt-8 text-center">
                        <p class="text-gray-600">已有账号?
                            <a href="login.html" class="text-primary font-medium hover:text-primary/80 transition-colors ml-1">
                                立即登录
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 密码显示/隐藏切换
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });

        toggleConfirmPassword.addEventListener('click', function() {
            const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPasswordInput.setAttribute('type', type);
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });

        // 表单输入动画效果
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', function() {
                this.parentElement.classList.remove('scale-[1.01]');
                // 失去焦点时验证
                validateField(this.id);
            });
        });

        // 验证字段
        function validateField(fieldId) {
            switch(fieldId) {
                case 'username':
                    validateUsername();
                    break;
                case 'password':
                    validatePassword();
                    break;
                case 'confirmPassword':
                    validateConfirmPassword();
                    break;
                case 'email':
                    validateEmail();
                    break;
                case 'phone':
                    validatePhone();
                    break;
                case 'terms':
                    validateTerms();
                    break;
            }
        }

        // 验证用户名
        function validateUsername() {
            const username = document.getElementById('username').value.trim();
            const errorEl = document.getElementById('usernameError');
            if (username === '') {
                errorEl.classList.remove('hidden');
                document.getElementById('username').classList.add('error-input');
                return false;
            } else {
                errorEl.classList.add('hidden');
                document.getElementById('username').classList.remove('error-input');
                return true;
            }
        }

        // 验证密码
        function validatePassword() {
            const password = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('passwordError');
            if (password === '' || password.length < 6) {
                errorEl.classList.remove('hidden');
                document.getElementById('password').classList.add('error-input');
                return false;
            } else {
                errorEl.classList.add('hidden');
                document.getElementById('password').classList.remove('error-input');
                return true;
            }
        }

        // 验证确认密码
        function validateConfirmPassword() {
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            const errorEl = document.getElementById('confirmPasswordError');
            if (confirmPassword === '' || confirmPassword !== password) {
                errorEl.classList.remove('hidden');
                document.getElementById('confirmPassword').classList.add('error-input');
                return false;
            } else {
                errorEl.classList.add('hidden');
                document.getElementById('confirmPassword').classList.remove('error-input');
                return true;
            }
        }

        // 验证邮箱
        function validateEmail() {
            const email = document.getElementById('email').value.trim();
            const errorEl = document.getElementById('emailError');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (email === '' || !emailRegex.test(email)) {
                errorEl.classList.remove('hidden');
                document.getElementById('email').classList.add('error-input');
                return false;
            } else {
                errorEl.classList.add('hidden');
                document.getElementById('email').classList.remove('error-input');
                return true;
            }
        }

        // 验证手机号
        function validatePhone() {
            const phone = document.getElementById('phone').value.trim();
            const errorEl = document.getElementById('phoneError');
            const phoneRegex = /^1[3-9]\d{9}$/;
            if (phone === '' || !phoneRegex.test(phone)) {
                errorEl.classList.remove('hidden');
                document.getElementById('phone').classList.add('error-input');
                return false;
            } else {
                errorEl.classList.add('hidden');
                document.getElementById('phone').classList.remove('error-input');
                return true;
            }
        }

        // 验证同意条款
        function validateTerms() {
            const terms = document.getElementById('terms').checked;
            const errorEl = document.getElementById('termsError');
            if (!terms) {
                errorEl.classList.remove('hidden');
                return false;
            } else {
                errorEl.classList.add('hidden');
                return true;
            }
        }

        // 表单提交验证
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const isUsernameValid = validateUsername();
            const isPasswordValid = validatePassword();
            const isConfirmPasswordValid = validateConfirmPassword();
            const isEmailValid = validateEmail();
            const isPhoneValid = validatePhone();
            const isTermsValid = validateTerms();
            
            if (isUsernameValid && isPasswordValid && isConfirmPasswordValid && isEmailValid && isPhoneValid && isTermsValid) {
                // 注册请求
                const user = {
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    nickname: document.getElementById('username').value
                };
                
                // 调用注册API
                fetch('/project-management/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(user),
                })
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200) {
                        // 注册成功，显示成功信息
                        document.getElementById('successMessage').classList.remove('hidden');
                        document.getElementById('errorMessage').classList.add('hidden');
                        
                        // 3秒后跳转到登录页面
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 3000);
                    } else {
                        // 注册失败，显示错误信息
                        document.getElementById('errorMessage').classList.remove('hidden');
                        document.getElementById('successMessage').classList.add('hidden');
                    }
                })
                .catch(error => {
                    console.error('注册请求失败:', error);
                    // 注册失败，显示错误信息
                    document.getElementById('errorMessage').classList.remove('hidden');
                    document.getElementById('successMessage').classList.add('hidden');
                });
            }
        });

        // 重置表单时清除错误状态
        function resetForm() {
            document.getElementById('successMessage').classList.add('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
            
            const errorElements = document.querySelectorAll('[id$="Error"]');
            errorElements.forEach(element => {
                element.classList.add('hidden');
            });
            
            const inputElements = document.querySelectorAll('input');
            inputElements.forEach(element => {
                element.classList.remove('error-input');
                element.classList.remove('success-input');
            });
        }
    </script>
</body>
</html>
